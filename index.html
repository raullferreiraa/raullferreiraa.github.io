<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio e CV de Raul Ferreira - Estudante de Ciência da Computação e Desenvolvedor Full Stack">
    <title>Raul Ferreira | Portfólio & CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent: #58a6ff;
            --project-accent: #3fb950;
            --text: #c9d1d9;
            --glass: rgba(255, 255, 255, 0.05);
            --glow-color: rgba(88, 166, 255, 0.3);
        }

        html { scroll-behavior: smooth; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
            min-height: 100vh;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 60px 20px; }

        header { text-align: center; margin-bottom: 30px; }
        .profile-pic { width: 130px; height: 130px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 20px; padding: 5px; box-shadow: 0 0 15px var(--glow-color); }
        h1 { font-size: 2.2rem; color: #fff; margin-bottom: 5px; }
        .location { font-size: 0.9rem; color: #8b949e; margin-bottom: 15px; }
        .badges-wrapper { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .badge { border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .badge.lang { border-color: #3fb950; color: #3fb950; }

        .about-text { 
            font-size: 0.95rem; 
            line-height: 1.6; 
            color: #8b949e; 
            text-align: center; 
            margin-bottom: 50px; 
            max-width: 700px; 
            margin-left: auto; 
            margin-right: auto;
        }
        .about-text strong { color: var(--accent); }

        .section-title { margin: 40px 0 20px; font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--glass); padding-bottom: 10px; }

        .card { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 12px; padding: 25px; margin-bottom: 20px; transition: 0.3s; position: relative; }
        .card:hover:not(.project-featured) { border-color: var(--accent); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        h3 { color: var(--accent); font-size: 1.1rem; }
        .date { font-size: 0.8rem; color: #8b949e; font-weight: 600; }
        .institution { font-size: 0.9rem; color: #fff; display: block; margin-bottom: 10px; }

        .courses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .course-item { font-size: 0.85rem; color: #8b949e; margin-bottom: 8px; list-style: none; }
        .course-item span { color: #fff; font-weight: 600; display: block; }

        /* Estilos do Projeto em Destaque */
        .project-featured {
            border: 2px solid;
            border-image-slice: 1;
            border-image-source: linear-gradient(135deg, var(--accent), #f9826c, var(--project-accent));
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.2), 0 0 50px rgba(130, 249, 108, 0.1);
        }
        
        .project-featured::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--accent), #f9826c, var(--project-accent));
            border-radius: 12px;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.3;
        }

        .project-icon { color: var(--accent); margin-right: 8px; }
        .project-featured h3 { font-size: 1.3rem; color: #fff; font-weight: 800; display: flex; align-items: center; }
        .project-featured h3 span { color: var(--accent); margin-right: 6px; }

        .project-features { list-style: none; margin: 15px 0; font-size: 0.85rem; color: #c9d1d9; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .project-features li { display: flex; align-items: center; gap: 8px; }
        .project-features li::before { content: "✔️"; color: var(--project-accent); font-size: 0.9rem; }
